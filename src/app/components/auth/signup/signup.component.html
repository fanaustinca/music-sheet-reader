<div class="auth-page">
  <div class="auth-card">
    <div class="logo">🎵</div>
    <h1>MusicSheet Reader</h1>
    <h2>Create your account</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password <span style="font-size:0.75rem;opacity:0.6">(min 6 chars)</span></label>
        <input type="password" formControlName="password" placeholder="••••••••" />
      </div>
      <div class="error" *ngIf="error">{{ error }}</div>
      <button type="submit" [disabled]="form.invalid">Create Account</button>
    </form>
    <p class="switch">Already have an account? <a routerLink="/auth/login">Log in</a></p>
  </div>
</div>
